<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algoritmo Genético</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Evolução das Gerações</h1>
    </header>

    <main>
      <section id="lotes-container">
        <h2>Lotes de Produção</h2>

        <div id="lotes"></div>
      </section>

      <section id="geracao-info">
        <h2 id="titulo-geracao"></h2>
      </section>

      <section id="populacao"></section>

      <section id="melhor-container">
        <h2>Melhor Indivíduo</h2>

        <div id="melhor"></div>
      </section>

      <div id="controles">
        <button id="btn-anterior">⏮</button>

        <button id="btn-play">▶</button>

        <button id="btn-proximo">⏭</button>
      </div>

      <nav id="paginacao"></nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
